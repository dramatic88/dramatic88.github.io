	<script>

var files = ["피슬.png",
             "각청.jpg",
             "감우.png",
             "진.png",
             "바바라.png",
             "고양이1.jpg",
             "고양이2.jpg",
             "고양이3.jpg",
             "고양이4.jpg"];
var imgs = new Array();
for(var i=0; i<files.length; i++) {
	imgs[i] = new Image(); 
	imgs[i].src = files[i]; 
}


var next = 1;
function change(img) {
	img.src = imgs[next].src; 
	next++; 
	next %= imgs.length; 
}

</script>
